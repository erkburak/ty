<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitem - Örnek Ürün Sayfası</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .product-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
            display: flex;
            gap: 40px;
        }

        .product-image {
            width: 300px;
            height: 300px;
            background: #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 24px;
        }

        .product-info h1 {
            margin-top: 0;
            color: #333;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #e53935;
            margin: 20px 0;
        }

        .add-to-cart {
            background: #000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Örnek bir ürün detay sayfası -->
        <div class="product-section">
            <div class="product-image">Ürün Görseli</div>
            <div class="product-info">
                <h1>Harika Tasarımlı Kablosuz Kulaklık</h1>
                <p>Barkod: <strong>8691234567890</strong></p>
                <div class="price">499,00 TL</div>
                <p>Bu ürün yüksek ses kalitesi ve uzun pil ömrü sunar. Müşterilerimizin favorisi!</p>
                <button class="add-to-cart">Sepete Ekle</button>
            </div>
        </div>

        <!-- İŞTE BURASI SİZİN SİTENİZE EKLEYECEĞİNİZ KISIM -->
        <h2>Müşteri Değerlendirmeleri</h2>

        <!-- Sitenizde göstermek istediğiniz yere bu HTML etiketini koyuyorsunuz. -->
        <div id="trendyol-yorum-alani" data-ty-widget="reviews" data-barcode="TYBV3AGC4O7HDWB930"
            data-api-key="sizin-gizli-anahtariniz">
        </div>


        <script src="widget.js"></script>

    </div>

</body>

</html>
